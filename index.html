<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2manatliqsayt</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;

  background-image: url("IMG_20250519_095639_890.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: min(90%, 600px);
  padding: 25px;

  background: rgba(25,25,25,0.6);
  backdrop-filter: blur(15px);

  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 10px 40px rgba(0,0,0,0.6);

  display: flex;
  flex-direction: column;
  gap: 12px;
}

.title {
  color: white;
  margin: 0;
  font-size: 20px;
}

.string{
  color:white
}

textarea {
  width: 100%;
  min-height: 140px;
  resize: none;

  padding: 14px;
  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);

  color: white;
  font-size: 15px;
  outline: none;
}

textarea::placeholder {
  color: rgba(255,255,255,0.5);
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;

  background: #7c4dff;
  color: white;
  font-weight: bold;

  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

.status {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
  <p class="string">Ciddən yoxlayırsan?
  O "gözəl" kodu sildim,məncə deməyə gərək yoxdu))</p>

  <h2 class="title">Bura ürək sözlərini yaza bilərsən(gormeyecem)</h2>

  <textarea id="msg" placeholder="Məs:Səndən nifrət edirəm.."></textarea>

  <button onclick="sendMessage()">Göndərr</button>

  <div class="status" id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://ywbbyhgvxgvgcspgmlzy.supabase.co";
const SUPABASE_KEY = "sb_publishable_EJ_FPdO9iZGiOjAXjYW1ug_nYq5jrwj";

async function sendMessage() {
  const text = document.getElementById("msg").value;
  const status = document.getElementById("status");

  if (!text.trim()) {
    status.innerText = "Text boş ola bilməz";
    return;
  }

  status.innerText = "Sending...";

  const res = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({
      text: text
    })
  });

  if (res.ok) {
    status.innerText = "Göndərildi ✔";
    document.getElementById("msg").value = "";
  } else {
    const err = await res.text();
    status.innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
